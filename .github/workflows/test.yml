name: Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync --group dev
    
    - name: Run linting
      run: |
        uv run ruff format --check --diff .
        uv run ruff check .
    
    - name: Run tests with coverage
      env:
        FAB_CLIENT_ID: ${{ secrets.FAB_CLIENT_ID }}
        FAB_CLIENT_SECRET: ${{ secrets.FAB_CLIENT_SECRET }}
        FAB_TENANT_ID: ${{ secrets.FAB_TENANT_ID }}
        FAB_USERNAME: ${{ secrets.FAB_USERNAME }}
        FAB_PASSWORD: ${{ secrets.FAB_PASSWORD }}
        AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
      run: uv run pytest --cov=pyfabricops --cov-report=xml --cov-report=term || echo "Tests completed with warnings"
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        fail_ci_if_error: false
    